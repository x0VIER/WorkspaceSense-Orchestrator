<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0b0e14; color: #d1d5db; font-family: 'Fira Code', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { width: 800px; background: #1a1b26; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; border: 1px solid #414868; }
        .header { background: #24283b; padding: 10px 15px; display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #f7768e; } .yellow { background: #e0af68; } .green { background: #9ece6a; }
        .content { padding: 20px; line-height: 1.5; font-size: 14px; }
        .prompt { color: #7aa2f7; } .output { color: #9ece6a; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        </div>
        <div class="content">
            <div><span class="prompt">$</span> python WorkspaceSense.py</div>
            <div class="output">Scanning repository structure... 420 files indexed. [OK]</div>
            <div class="output">Operation completed. [FORENSIC SUCCESS]</div>
        </div>
    </div>
</body>
</html>
