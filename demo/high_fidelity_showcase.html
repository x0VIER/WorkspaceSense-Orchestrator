
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        
        :root {
            --bg-color: #0d0f14;
            --terminal-bg: rgba(26, 27, 38, 0.85);
            --banana-yellow: #FFD700;
            --botanical-green: #9ece6a;
            --electric-cobalt: #7aa2f7;
            --frosted-white: rgba(245, 245, 247, 0.1);
        }

        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 50%, #1a1b26 0%, #0d0f14 100%);
            color: #d1d5db; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .showcase-container {
            position: relative;
            padding: 40px;
        }

        .terminal { 
            width: 850px; 
            background: var(--terminal-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 0 1px var(--frosted-white); 
            overflow: hidden; 
            border: 1px solid rgba(65, 72, 104, 0.5); 
        }

        .header { 
            background: rgba(36, 40, 59, 0.5); 
            padding: 12px 20px; 
            display: flex; 
            align-items: center;
            gap: 10px; 
            border-bottom: 1px solid rgba(65, 72, 104, 0.3);
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #f7768e; } 
        .yellow { background: #e0af68; } 
        .green { background: #9ece6a; }

        .title {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: rgba(209, 213, 219, 0.5);
            letter-spacing: 1px;
        }

        .content { 
            padding: 30px; 
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6; 
            font-size: 15px; 
        }

        .prompt-line { margin-bottom: 15px; }
        .prompt { color: var(--electric-cobalt); font-weight: bold; }
        .command { color: #ffffff; }
        .output { color: var(--botanical-green); margin-top: 5px; }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            background: rgba(158, 206, 106, 0.1);
            border: 1px solid var(--botanical-green);
            color: var(--botanical-green);
        }

        .banana-glow {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: var(--banana-yellow);
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="showcase-container">
        <div class="banana-glow"></div>
        <div class="terminal">
            <div class="header">
                <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
                <div class="title">Drift v1.2.0 | CODEX 2026</div>
            </div>
            <div class="content">
                <div class="prompt-line">
                    <span class="prompt">x0VIER@codex:~$</span> <span class="command">python Drift.py</span>
                </div>
                <div class="output">
                    Scanning repository structure...<br>Indexing source files: 1,420 nodes detected.<br>Environment Drift Status: PERFECT (No drift).<br>Technical manifest archived.
                </div>
                <div class="status-badge">Session Verified</div>
            </div>
        </div>
    </div>
</body>
</html>
